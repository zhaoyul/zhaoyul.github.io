<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF9F6;
      --bg-card: #FFFFFF;
      --text: #1A1A1A;
      --text-muted: #6B6B6B;
      --accent: #C45D3E;
      --border: #E8E4DF;
      --radius: 12px;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --max-width: 1100px;
    }
    [data-theme="dark"] {
      --bg: #0F0F0F;
      --bg-card: #1A1A1A;
      --text: #E8E4DF;
      --text-muted: #8A8A8A;
      --accent: #E07A5F;
      --border: #2A2A2A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s ease, color 0.3s ease;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }
    .site-title:hover { color: var(--accent); }
    .site-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .header-nav {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .header-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .header-nav a:hover { color: var(--accent); }
    .theme-toggle {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: grid;
      place-items: center;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .theme-toggle svg { width: 18px; height: 18px; }
    .icon-sun, .icon-moon { display: none; }
    [data-theme="dark"] .icon-sun { display: block; }
    [data-theme="light"] .icon-moon, :not([data-theme]) .icon-moon { display: block; }
    .lang-toggle {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .lang-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    [data-lang="zh"], [data-lang="en"] { display: none; }
    [data-lang].active { display: block; }
    span[data-lang], a[data-lang] { display: none; }
    span[data-lang].active, a[data-lang].active { display: inline; }
    .post-hero {
      max-width: 720px;
      margin: 0 auto;
      padding: 5rem 2rem 3rem;
    }
    .post-hero .post-date {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .post-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-top: 0.75rem;
    }
    .post-body {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
      font-size: 1.1rem;
      line-height: 1.85;
    }
    .post-body h2 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 600;
      margin: 3rem 0 1rem;
    }
    .post-body h3 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
      margin: 2rem 0 0.75rem;
    }
    .post-body p { margin-bottom: 1.5rem; }
    .post-body a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .post-body code {
      background: var(--border);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .post-body pre {
      background: #1A1A1A;
      color: #E8E4DF;
      padding: 1.5rem;
      border-radius: var(--radius);
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    .post-body pre code { background: none; padding: 0; color: inherit; }
    .post-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-style: italic;
    }
    .post-body ul, .post-body ol { margin: 1rem 0 1.5rem 1.5rem; }
    .post-body li { margin-bottom: 0.5rem; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .footer-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }
    @media (max-width: 640px) {
      .header-inner { padding: 1rem 1.25rem; }
      .site-desc { display: none; }
      .post-hero { padding: 3rem 1.25rem 2rem; }
      .post-body { padding: 0 1.25rem 4rem; }
      .footer-inner { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <div class="header-nav">
        <span class="site-desc">{{ site.description }}</span>
        <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <article>
    <div class="post-hero">
      <a href="{{ '/' | relative_url }}" class="back-link" data-lang="zh">← 返回</a>
      <a href="{{ '/' | relative_url }}" class="back-link" data-lang="en">← Back</a>
      <span class="post-date" data-lang="zh">{{ page.date | date: "%Y年%m月%d日" }}</span>
      <span class="post-date" data-lang="en">{{ page.date | date: "%B %d, %Y" }}</span>
      <h1 data-lang="zh">{{ page.title_zh | default: page.title }}</h1>
      <h1 data-lang="en">{{ page.title_en | default: page.title }}</h1>
    </div>
    <div class="post-body">
      {{ content }}
    </div>
  </article>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-text">&copy; {{ site.time | date: "%Y" }} {{ site.title }}</span>
      <div class="footer-links">
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        <a href="https://github.com/zhaoyul" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <script>
    function getTheme() {
      return localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
    }
    function toggleTheme() {
      setTheme(getTheme() === 'dark' ? 'light' : 'dark');
    }
    setTheme(getTheme());

    function getLang() {
      return localStorage.getItem('lang') || 'zh';
    }
    function setLang(lang) {
      localStorage.setItem('lang', lang);
      applyLang(lang);
    }
    function toggleLang() {
      setLang(getLang() === 'zh' ? 'en' : 'zh');
    }
    function applyLang(lang) {
      document.getElementById('langBtn').textContent = lang === 'zh' ? 'EN' : '中';
      document.querySelectorAll('[data-lang]').forEach(el => {
        el.classList.toggle('active', el.getAttribute('data-lang') === lang);
      });
    }
    applyLang(getLang());
  </script>
</body>
</html>
